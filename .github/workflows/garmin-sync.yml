name: Garmin Daily Sync

on:
  schedule:
    - cron: '0 8 * * *'    # 09:00 CET (UTC+1) / 10:00 CEST (UTC+2)
    - cron: '0 14 * * *'   # 15:00 hora española (UTC+1 invierno)
    - cron: '0 22 * * *'   # 23:00 hora española (UTC+1 invierno)
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha a sincronizar (YYYY-MM-DD). Vacío = hoy.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore Garmin OAuth1 token
        run: |
          mkdir -p ~/.garmin-mcp
          echo '${{ secrets.GARMIN_OAUTH1_TOKEN }}' > ~/.garmin-mcp/oauth1_token.json
          chmod 600 ~/.garmin-mcp/oauth1_token.json

      - name: Cache Garmin OAuth2 token
        uses: actions/cache@v4
        with:
          path: ~/.garmin-mcp/oauth2_token.json
          key: garmin-oauth2-${{ github.run_id }}
          restore-keys: garmin-oauth2-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          SYNC_DATE: ${{ github.event.inputs.date }}
        run: node build/sync.js
